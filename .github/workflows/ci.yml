name: npm

on:
  push:
    branches-ignore:
      - master

jobs:
  stamps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 12
      - run: npm run stamps
      - name: Upload files
        uses: actions/upload-artifact@v2
        with:
          name: kia
          path: /home/runner/work/Kuvork/Kuvork/kia.european.token.collection.ts

      # move the generated files to the right place in the repo
      
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 12
      - run: npm ci
      - run: npm test
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 12
      - run: npm ci
      - run: npm run build
